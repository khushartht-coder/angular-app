name: Build and Deploy Docker Image

on:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: angular-app

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.ANGULAR_GHCR_PAT }}

      - name: Build Docker Image
        run: |
          docker build -t $REGISTRY/${{ github.actor }}/$IMAGE_NAME:latest .

      - name: Push Docker Image
        run: |
          docker push $REGISTRY/${{ github.actor }}/$IMAGE_NAME:latest

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:

      - name: Create SSH Key
        run: |
          echo "${{ secrets.EC2_SSH_KEY }}" > key.pem
          chmod 600 key.pem

      - name: Deploy to EC2
        run: |
          ssh -i key.pem -o StrictHostKeyChecking=no ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << EOF

            docker login ghcr.io \
              -u ${{ github.actor }} \
              -p ${{ secrets.ANGULAR_GHCR_PAT }}

            docker pull ghcr.io/${{ github.actor }}/angular-app:latest

            docker rm -f angular-app || true

            docker run -d \
              --name angular-app \
              -p 4200:80 \
              ghcr.io/${{ github.actor }}/angular-app:latest

            docker ps

          EOF
