name: Build and Deploy Angular Application

on:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: angular-app
  CONTAINER_NAME: angular-app

jobs:
  build:
    name: Build and Push Image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.ANGULAR_GHCR_PAT }}

      - name: Build Docker Image
        run: |
          docker build \
            -t $REGISTRY/${{ github.actor }}/$IMAGE_NAME:latest \
            -t $REGISTRY/${{ github.actor }}/$IMAGE_NAME:${{ github.sha }} .

      - name: Push Latest Image
        run: |
          docker push $REGISTRY/${{ github.actor }}/$IMAGE_NAME:latest

      - name: Push Commit SHA Image
        run: |
          docker push $REGISTRY/${{ github.actor }}/$IMAGE_NAME:${{ github.sha }}

  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Create SSH Key
        run: |
          echo "${{ secrets.EC2_SSH_KEY }}" > key.pem
          chmod 600 key.pem

      - name: Deploy Application
        run: |
          ssh -i key.pem -o StrictHostKeyChecking=no \
          ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << EOF

          echo "Logging into GHCR..."

          echo "${{ secrets.ANGULAR_GHCR_PAT }}" | docker login ghcr.io \
            -u "${{ github.actor }}" \
            --password-stdin

          echo "Pulling latest image..."
          docker pull ghcr.io/${{ github.actor }}/angular-app:latest

          echo "Stopping old container..."
          docker rm -f angular-app || true

          echo "Cleaning unused Docker images..."
          docker image prune -af

          echo "Starting new container..."
          docker run -d \
            --name angular-app \
            --restart unless-stopped \
            -p 4200:80 \
            ghcr.io/${{ github.actor }}/angular-app:latest

          echo "Running Containers:"
          docker ps

          echo "Deployment Successful"

          EOF