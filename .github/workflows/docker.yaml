name: Build and Deploy Angular Application

on:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: demo-app-angular
  CONTAINER_NAME: demo-app-angular

jobs:
  build:
    name: Build and Push Image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Login to GHCR
        run: |
          echo "${{ secrets.ANGULAR_GHCR_PAT }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Build Docker Image
        run: |
          docker build -t $REGISTRY/${{ github.repository_owner }}/$IMAGE_NAME:latest .

      - name: Push Docker Image
        run: |
          docker push $REGISTRY/${{ github.repository_owner }}/$IMAGE_NAME:latest

  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Create SSH Key
        run: |
          echo "${{ secrets.EC2_SSH_KEY }}" > key.pem
          chmod 600 key.pem

      - name: Deploy Application
        run: |
          ssh -i key.pem -o StrictHostKeyChecking=no \
          ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << EOF

          echo "Logging into GHCR..."
          echo "${{ secrets.ANGULAR_GHCR_PAT }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

          echo "Pulling latest image..."
          docker pull ghcr.io/${{ github.repository_owner }}/$IMAGE_NAME:latest

          echo "Removing old container..."
          docker rm -f $CONTAINER_NAME || true

          echo "Running new container..."
          docker run -d \
            --name $CONTAINER_NAME \
            --restart unless-stopped \
            -p 4200:80 \
            ghcr.io/${{ github.repository_owner }}/$IMAGE_NAME:latest

          echo "Running Containers:"
          docker ps

          EOF